<!DOCTYPE html>
<!-- v 2026.07.09.01 — 3 nuove capacità sulle prenotazioni (richiesta Andrea): AGGIUNGI — bottone
     "+ Nuova prenotazione" nella vista giorno, apre un form (nome/telefono richiesti, email/persone/
     data/orario/occasione/intolleranze/note) → nuova azione create_reservation su set-reminder-
     settings v5 (source='gestionale_manuale', arrivo_status di default 'in_attesa', status di default
     'pending_review' come le prenotazioni dal sito: stesso badge "Confermata" e stesso reminder
     automatico, nessuna azione speciale). ELIMINA — bottone "✕ Elimina" su ogni riga (vista giorno E
     ricerca), con conferma; nuova azione delete_reservation (DELETE definitivo by id; non tocca righe
     collegate su SafeTable/cauzioni, restano lì e vanno gestite a parte se presenti). MODIFICA STATO
     ARRIVO — sostituiti i 2 bottoni "Arrivato"/"No-show" (visibili solo quando in_attesa, mai più
     modificabili dopo) con 3 bottoni sempre visibili "In attesa"/"Arrivato"/"No-show" (buildArrivoControls),
     quello attivo evidenziato; permette di correggere un arrivo/no-show impostato per errore. Il
     backend (set_arrivo_status v4, già in produzione) supportava già tutte le transizioni — mancava
     solo la UI per farle. arrivoBadge() rimossa (ridondante coi bottoni sempre visibili). -->
<!-- v 2026.07.05.06 — nuova barra di ricerca clienti (sotto il top-bar, sempre visibile): cerca per
     nome, telefono o email tra TUTTE le prenotazioni (non solo il giorno), via nuova Edge Function
     gestionale-search (GET pubblico, stesso pattern di gestionale-day). Risultati con stessi badge
     della vista giorno + bottone "Vai al giorno" per aprire quella data. Nessuna modifica alle
     viste mese/giorno esistenti. -->
<!-- v 2026.07.05.05 — confermaBadge non dipende più da confermata_at: il bottone verde "Conferma" è stato
     tolto dalla mail M1bis (submit-reservation v25/v26 — send-reservation-reminders v2 manda il reminder
     automatico a tutte le prenotazioni non rifiutate/annullate, senza bisogno di conferma). Il badge
     "✓ Confermata" ora compare per qualunque prenotazione attiva, sempre, anche senza click. -->
<!-- v 2026.07.05.04 — nella vista giorno, nuovo badge "✓ Confermata" / "Da confermare" basato su confermata_at
     (si valorizza quando clicchi "Conferma" nella mail M1bis) — il campo era già restituito da gestionale-day,
     solo aggiunto il badge in renderDay. Non mostrato se la prenotazione è rifiutata/annullata (statusBadge prevale). -->
<!-- v 2026.07.05.03 — Fase 1 (Calendario/Servizio), ispirata a TheFork Manager su richiesta Andrea 4/7/2026.
     Pagina admin standalone (separata da menu-admin.html, che resta per il contenuto del menù).
     Legge da gestionale-calendar-status (vista mese) + gestionale-day (vista giorno).
     v.02 (5/7): il reminder è ora automatico per tutte le prenotazioni future (non serve più
     confermare) → tolti i pulsanti verde/rosso di conferma/rifiuto. Al loro posto: stato ARRIVO
     manuale (in attesa/arrivato/no-show, azione set_arrivo_status) + stato GARANZIA in sola
     lettura (richiesta/effettuata, calcolato dal gestionale-day joinando SafeTable/cauzioni).
     v.03 (5/7): appena si imposta Arrivato/No-show, i 2 pulsanti spariscono e resta solo il
     badge di stato (niente più pulsante di reset "↺" — se serve correggere, richiesta futura).
     Azioni riusano set-reminder-settings (stesso gh_token delle altre sezioni admin).
     noindex: pagina interna, non deve finire in ricerca. -->
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Gestionale Prenotazioni — Santamonica</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --cream:#faf7f2; --ink:#1a1714; --stone:#8c7e6e; --rust:#9e4a2a; --rule:#d4c9b8; --sand:#f0ebe0; --ok:#2d6a4f; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; font-weight:300; font-size:14px; padding-bottom:4rem; }

    .top-bar { background:var(--ink); color:var(--cream); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; position:sticky; top:0; z-index:50; }
    .top-bar h1 { font-size:.8rem; font-weight:400; letter-spacing:.18em; text-transform:uppercase; }
    .logo-sm { font-size:.7rem; letter-spacing:.2em; color:var(--stone); text-transform:uppercase; }
    .top-bar a.back { color:var(--cream); opacity:.75; font-size:.7rem; letter-spacing:.08em; text-decoration:none; }
    .top-bar a.back:hover { opacity:1; }

    .btn { padding:.45rem 1.1rem; border:1px solid var(--rule); background:#fff; font-family:'Jost',sans-serif; font-size:.72rem; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; color:var(--ink); }
    .btn:hover { background:var(--sand); }
    .btn-ok { background:var(--ok); border-color:var(--ok); color:#fff; }
    .btn-ok:hover { opacity:.88; }
    .btn-rust { background:var(--rust); border-color:var(--rust); color:#fff; }
    .btn-rust:hover { opacity:.88; }

    .toolbar { max-width:1100px; margin:1.4rem auto .8rem; padding:0 1rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    .toolbar .nav-month { display:flex; align-items:center; gap:.6rem; }
    .toolbar .month-label { font-size:.95rem; letter-spacing:.06em; min-width:150px; text-align:center; }
    .toolbar .counts { margin-left:auto; font-size:.72rem; color:var(--stone); letter-spacing:.04em; }

    .cal-wrap { max-width:1100px; margin:0 auto 2rem; padding:0 1rem; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1px; background:var(--rule); border:1px solid var(--rule); }
    .cal-hdr { background:var(--sand); text-align:center; padding:.5rem 0; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--stone); }
    .cal-cell { background:#fff; min-height:96px; padding:.4rem .5rem; cursor:pointer; transition:background .12s; }
    .cal-cell:hover { background:var(--sand); }
    .cal-cell.empty { background:var(--cream); cursor:default; }
    .cal-cell.today .cal-daynum { background:var(--ink); color:#fff; }
    .cal-daynum { display:inline-block; font-size:.78rem; color:var(--stone); width:20px; height:20px; line-height:20px; text-align:center; border-radius:50%; }
    .cal-svc { margin-top:.35rem; font-size:.62rem; letter-spacing:.02em; display:flex; justify-content:space-between; padding:.1rem 0; }
    .cal-svc.closed { color:#bbb; text-decoration:line-through; }
    .cal-svc.open .cal-name { color:var(--ink); font-weight:400; }
    .cal-svc .cal-covers { color:var(--stone); }
    .cal-closed-badge { display:inline-block; margin-top:.4rem; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; color:#aaa; background:var(--cream); border:1px solid var(--rule); padding:.1rem .4rem; }

    .day-wrap { max-width:800px; margin:1rem auto 2rem; padding:0 1rem; display:none; }
    .day-wrap.on { display:block; }
    .day-hdr { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; flex-wrap:wrap; }
    .day-hdr h2 { font-size:1rem; font-weight:400; letter-spacing:.04em; }
    .day-hdr .sub { font-size:.72rem; color:var(--stone); }

    .res-row { background:#fff; border:1px solid var(--rule); padding:.8rem 1rem; margin-bottom:.6rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    .res-orario { font-size:.95rem; min-width:52px; font-weight:400; }
    .res-info { flex:1; min-width:200px; }
    .res-info .nome { font-weight:400; }
    .res-info .meta { font-size:.72rem; color:var(--stone); margin-top:.15rem; }
    .badge { font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; padding:.15rem .5rem; border-radius:2px; white-space:nowrap; }
    .badge-wait { background:var(--sand); color:var(--stone); border:1px solid var(--rule); }
    .badge-ok { background:#e6f0ea; color:var(--ok); border:1px solid #bcd9c9; }
    .badge-no { background:#f6e7e2; color:var(--rust); border:1px solid #e3bcac; }
    .badge-cauzione { background:#f0ebe0; color:#7d6a3a; border:1px solid var(--rule); }
    .res-actions { display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; }
    .res-actions button { padding:.35rem .8rem; font-size:.62rem; }
    .seg-btn { padding:.3rem .65rem; font-size:.6rem; letter-spacing:.04em; text-transform:uppercase; border:1px solid var(--rule); background:#fff; color:var(--stone); cursor:pointer; }
    .seg-btn:hover { background:var(--sand); }
    .seg-btn.on-wait { background:var(--sand); color:var(--ink); border-color:var(--stone); font-weight:400; }
    .seg-btn.on-ok { background:var(--ok); color:#fff; border-color:var(--ok); }
    .seg-btn.on-no { background:var(--rust); color:#fff; border-color:var(--rust); }
    .btn-del { border-color:var(--rule); color:var(--stone); background:#fff; }
    .btn-del:hover { background:#f6e7e2; color:var(--rust); border-color:#e3bcac; }

    .new-res-wrap { max-width:800px; margin:0 auto 1.2rem; padding:0 1rem; display:none; }
    .new-res-wrap.on { display:block; }
    .new-res-box { background:#fff; border:1px solid var(--rule); padding:1rem 1.2rem; }
    .new-res-box h3 { font-size:.78rem; font-weight:500; letter-spacing:.1em; text-transform:uppercase; color:var(--stone); margin-bottom:.8rem; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:.6rem .8rem; margin-bottom:.6rem; }
    .form-grid label { display:block; font-size:.62rem; color:var(--stone); letter-spacing:.06em; text-transform:uppercase; margin-bottom:.2rem; }
    .form-grid input, .form-grid textarea { width:100%; padding:.4rem .55rem; border:1px solid var(--rule); font-family:'Jost',sans-serif; font-size:.82rem; color:var(--ink); background:var(--cream); }
    .form-grid .full { grid-column:1 / -1; }
    .new-res-actions { display:flex; gap:.5rem; align-items:center; margin-top:.4rem; }

    .empty-msg { color:var(--stone); font-size:.85rem; padding:2rem 0; text-align:center; }
    .status-line { font-size:.75rem; color:var(--stone); margin-top:.5rem; }
    .status-line.err { color:var(--rust); }
    footer.ver { text-align:center; padding:6px 0; font-family:'Jost',sans-serif; font-size:.55rem; color:#888; letter-spacing:.1em; }

    .search-bar { max-width:1100px; margin:1.2rem auto 0; padding:0 1rem; display:flex; gap:.6rem; flex-wrap:wrap; }
    .search-bar input[type=text] { flex:1; min-width:220px; padding:.55rem .8rem; border:1px solid var(--rule); font-family:'Jost',sans-serif; font-size:.85rem; background:#fff; color:var(--ink); }
    .search-bar input[type=text]:focus { outline:1px solid var(--rust); }
    .res-date { min-width:96px; font-size:.85rem; }
    .res-date .res-time { display:block; font-size:.68rem; color:var(--stone); margin-top:.1rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="logo-sm">Santamonica</div>
    <h1>Gestionale Prenotazioni</h1>
  </div>
  <a class="back" href="menu-admin.html">← Admin Menù</a>
</div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="Cerca cliente per nome, telefono o email…" onkeydown="if(event.key==='Enter'){event.preventDefault();doSearch();}" />
  <button class="btn" onclick="doSearch()">Cerca</button>
  <button class="btn" id="search-clear-btn" onclick="clearSearch()" style="display:none;">✕ Chiudi ricerca</button>
</div>

<div class="toolbar">
  <div class="nav-month">
    <button class="btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label">…</span>
    <button class="btn" onclick="changeMonth(1)">›</button>
    <button class="btn" onclick="goToday()">Oggi</button>
  </div>
  <span class="counts" id="month-counts"></span>
</div>

<div class="cal-wrap" id="cal-wrap">
  <div class="cal-grid" id="cal-grid"></div>
  <div class="status-line" id="cal-status"></div>
</div>

<div class="day-wrap" id="day-wrap">
  <div class="day-hdr">
    <button class="btn" onclick="backToMonth()">‹ Torna al mese</button>
    <div>
      <h2 id="day-title">…</h2>
      <div class="sub" id="day-sub"></div>
    </div>
    <button class="btn btn-ok" id="new-res-toggle-btn" onclick="toggleNewResForm()" style="margin-left:auto;">+ Nuova prenotazione</button>
  </div>

  <div class="new-res-wrap" id="new-res-wrap">
    <div class="new-res-box">
      <h3>Nuova prenotazione manuale</h3>
      <div class="form-grid">
        <div><label>Nome *</label><input type="text" id="nr-nome" /></div>
        <div><label>Telefono *</label><input type="text" id="nr-telefono" /></div>
        <div><label>Email</label><input type="text" id="nr-email" /></div>
        <div><label>Persone *</label><input type="text" id="nr-persone" placeholder="es. 2" /></div>
        <div><label>Data *</label><input type="date" id="nr-data" /></div>
        <div><label>Orario *</label><input type="text" id="nr-orario" placeholder="es. 20:00" /></div>
        <div><label>Occasione</label><input type="text" id="nr-occasione" /></div>
        <div><label>Intolleranze</label><input type="text" id="nr-intolleranze" /></div>
        <div class="full"><label>Note</label><input type="text" id="nr-note" /></div>
      </div>
      <div class="new-res-actions">
        <button class="btn btn-ok" onclick="submitNewRes()">✦ Crea prenotazione</button>
        <button class="btn" onclick="toggleNewResForm()">Annulla</button>
        <span class="status-line" id="new-res-status" style="margin:0;"></span>
      </div>
    </div>
  </div>

  <div id="day-list"></div>
  <div class="status-line" id="day-status"></div>
</div>

<div class="day-wrap" id="search-wrap">
  <div class="day-hdr">
    <button class="btn" onclick="clearSearch()">‹ Torna al mese</button>
    <div>
      <h2 id="search-title">Risultati ricerca</h2>
      <div class="sub" id="search-sub"></div>
    </div>
  </div>
  <div id="search-list"></div>
  <div class="status-line" id="search-status"></div>
</div>

<footer class="ver">v 2026.07.09.01</footer>

<script>
var CAL_URL = 'https://xbksultfskvzgncncada.supabase.co/functions/v1/gestionale-calendar-status';
var DAY_URL = 'https://xbksultfskvzgncncada.supabase.co/functions/v1/gestionale-day';
var ACTION_URL = 'https://xbksultfskvzgncncada.supabase.co/functions/v1/set-reminder-settings';
var SEARCH_URL = 'https://xbksultfskvzgncncada.supabase.co/functions/v1/gestionale-search';

var today = new Date();
var curYear = today.getFullYear();
var curMonth = today.getMonth() + 1; // 1-based
var curDate = null; // YYYY-MM-DD quando in vista giorno

var MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function pad2(n) { return String(n).padStart(2, '0'); }
function todayStr() { return today.getFullYear() + '-' + pad2(today.getMonth() + 1) + '-' + pad2(today.getDate()); }
function fmtMonthParam(y, m) { return y + '-' + pad2(m); }
function fmtItDate(dateStr) {
  var p = dateStr.split('-');
  var giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  var d = new Date(dateStr + 'T00:00:00');
  return giorni[d.getDay()] + ' ' + parseInt(p[2],10) + ' ' + MESI[parseInt(p[1],10)-1] + ' ' + p[0];
}

function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  if (curMonth < 1) { curMonth = 12; curYear--; }
  loadMonth();
}

function goToday() {
  curYear = today.getFullYear();
  curMonth = today.getMonth() + 1;
  loadMonth();
}

function _calSetStatus(msg, isErr) {
  var el = document.getElementById('cal-status');
  el.textContent = msg || '';
  el.className = 'status-line' + (isErr ? ' err' : '');
}

function loadMonth() {
  document.getElementById('month-label').textContent = MESI[curMonth-1] + ' ' + curYear;
  _calSetStatus('Caricamento…');
  fetch(CAL_URL + '?month=' + fmtMonthParam(curYear, curMonth), { cache: 'no-store' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      renderMonth(d.days || []);
      _calSetStatus('');
    })
    .catch(function () { _calSetStatus('Errore nel caricamento del calendario.', true); });
}

function renderMonth(days) {
  var grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].forEach(function (h) {
    var hdr = document.createElement('div'); hdr.className = 'cal-hdr'; hdr.textContent = h; grid.appendChild(hdr);
  });

  if (!days.length) return;
  var firstDate = new Date(days[0].date + 'T00:00:00');
  var jsDay = firstDate.getDay(); // 0=Dom..6=Sab
  var leading = (jsDay === 0) ? 6 : jsDay - 1; // colonna Lun=0
  for (var i = 0; i < leading; i++) {
    var e = document.createElement('div'); e.className = 'cal-cell empty'; grid.appendChild(e);
  }

  var totalCovers = 0, totalRes = 0;

  days.forEach(function (day) {
    var cell = document.createElement('div');
    cell.className = 'cal-cell' + (day.date === todayStr() ? ' today' : '');
    var dnum = document.createElement('span'); dnum.className = 'cal-daynum';
    dnum.textContent = parseInt(day.date.split('-')[2], 10);
    cell.appendChild(dnum);

    if (!day.services.length) {
      var badge = document.createElement('div'); badge.className = 'cal-closed-badge'; badge.textContent = 'Chiuso';
      cell.appendChild(badge);
    } else {
      day.services.forEach(function (s) {
        totalCovers += s.covers; totalRes += s.count;
        var row = document.createElement('div');
        row.className = 'cal-svc ' + (s.closed ? 'closed' : 'open');
        var lbl = s.service === 'pranzo' ? 'Pranzo' : 'Cena';
        row.innerHTML = '<span class="cal-name">' + lbl + '</span><span class="cal-covers">' +
          (s.closed ? 'chiuso' : ('¶' + s.covers + ' · ' + s.count)) + '</span>';
        cell.appendChild(row);
      });
    }

    cell.onclick = function () { openDay(day.date); };
    grid.appendChild(cell);
  });

  document.getElementById('month-counts').textContent =
    'Coperti previsti nel mese: ' + totalCovers + ' · Prenotazioni: ' + totalRes;
}

function openDay(dateStr) {
  curDate = dateStr;
  document.getElementById('cal-wrap').style.display = 'none';
  document.getElementById('day-wrap').classList.add('on');
  document.querySelector('.toolbar').style.display = 'none';
  document.getElementById('day-title').textContent = fmtItDate(dateStr);
  document.getElementById('new-res-wrap').classList.remove('on');
  loadDay();
}

function backToMonth() {
  document.getElementById('cal-wrap').style.display = '';
  document.getElementById('day-wrap').classList.remove('on');
  document.querySelector('.toolbar').style.display = '';
  loadMonth(); // ricarica: i conteggi possono essere cambiati dopo conferme/rifiuti
}

function _daySetStatus(msg, isErr) {
  var el = document.getElementById('day-status');
  el.textContent = msg || '';
  el.className = 'status-line' + (isErr ? ' err' : '');
}

function loadDay() {
  _daySetStatus('Caricamento…');
  fetch(DAY_URL + '?date=' + curDate, { cache: 'no-store' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      renderDay(d.reservations || []);
      _daySetStatus('');
    })
    .catch(function () { _daySetStatus('Errore nel caricamento delle prenotazioni.', true); });
}

function statusBadge(r) {
  // status (rejected/cancelled) prevale su tutto: se scartata, arrivo/garanzia non hanno senso.
  if (r.status === 'rejected') return '<span class="badge badge-no">✕ Rifiutata</span>';
  if (r.status === 'cancelled') return '<span class="badge badge-no">Annullata</span>';
  return '';
}

function confermaBadge(r) {
  // v 2026.07.05.05: il reminder automatico (send-reservation-reminders v2) parte
  // per TUTTE le prenotazioni non rifiutate/annullate, senza bisogno del click sul
  // link "Conferma" (rimosso dalla mail M1bis — restava solo "Rifiuta", l'unica
  // azione con effetto reale). Quindi il badge non dipende più da confermata_at:
  // qualunque prenotazione attiva è "confermata" a tutti gli effetti pratici.
  if (r.status === 'rejected' || r.status === 'cancelled') return '';
  return '<span class="badge badge-ok">✓ Confermata</span>';
}

function garanziaBadge(r) {
  if (r.garanzia_status === 'effettuata') return '<span class="badge badge-ok">✓ Garanzia</span>';
  if (r.garanzia_status === 'richiesta') return '<span class="badge badge-cauzione">Garanzia richiesta</span>';
  if (r.garanzia_status === 'annullata') return '<span class="badge badge-no">Garanzia annullata</span>';
  return '';
}

function buildArrivoControls(r, onChanged) {
  var wrap = document.createElement('div'); wrap.className = 'res-actions';
  var opts = [
    { value: 'in_attesa', label: 'In attesa', cls: 'on-wait' },
    { value: 'arrivato', label: 'Arrivato', cls: 'on-ok' },
    { value: 'no_show', label: 'No-show', cls: 'on-no' }
  ];
  opts.forEach(function (o) {
    var b = document.createElement('button');
    b.className = 'seg-btn' + (r.arrivo_status === o.value ? ' ' + o.cls : '');
    b.textContent = o.label;
    b.onclick = function () { setArrivoStatus(r.id, o.value, onChanged); };
    wrap.appendChild(b);
  });
  var del = document.createElement('button');
  del.className = 'btn btn-del'; del.textContent = '✕ Elimina';
  del.onclick = function () { deleteReservation(r.id, r.nome, onChanged); };
  wrap.appendChild(del);
  return wrap;
}

function renderDay(rows) {
  var list = document.getElementById('day-list');
  document.getElementById('day-sub').textContent = rows.length ? (rows.length + ' prenotazioni') : '';
  if (!rows.length) { list.innerHTML = '<div class="empty-msg">Nessuna prenotazione per questo giorno.</div>'; return; }
  list.innerHTML = '';
  rows.forEach(function (r) {
    var row = document.createElement('div'); row.className = 'res-row';
    row.innerHTML =
      '<div class="res-orario">' + r.orario + '</div>' +
      '<div class="res-info">' +
        '<div class="nome">' + escapeHtml(r.nome) + ' · ' + r.persone + 'p</div>' +
        '<div class="meta">' + (r.telefono ? '<a href="tel:' + escapeHtml(r.telefono) + '">' + escapeHtml(r.telefono) + '</a>' : '') +
          (r.occasione ? ' · ' + escapeHtml(r.occasione) : '') +
          (r.intolleranze ? ' · ' + escapeHtml(r.intolleranze) : '') + '</div>' +
      '</div>' +
      '<div>' + statusBadge(r) + ' ' + confermaBadge(r) + ' ' + garanziaBadge(r) + '</div>';
    row.appendChild(buildArrivoControls(r, loadDay));
    list.appendChild(row);
  });
}

function escapeHtml(s) {
  var d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML;
}

function fmtItDateShort(dateStr) {
  var p = dateStr.split('-');
  return parseInt(p[2], 10) + ' ' + MESI[parseInt(p[1], 10) - 1].slice(0, 3) + ' ' + p[0];
}

function _searchSetStatus(msg, isErr) {
  var el = document.getElementById('search-status');
  el.textContent = msg || '';
  el.className = 'status-line' + (isErr ? ' err' : '');
}

function doSearch() {
  var q = (document.getElementById('search-input').value || '').trim();
  if (q.length < 2) { _searchSetStatus('Scrivi almeno 2 caratteri.', true); return; }

  document.getElementById('cal-wrap').style.display = 'none';
  document.getElementById('day-wrap').classList.remove('on');
  document.querySelector('.toolbar').style.display = 'none';
  document.getElementById('search-wrap').classList.add('on');
  document.getElementById('search-clear-btn').style.display = '';
  document.getElementById('search-title').textContent = 'Risultati per «' + q + '»';
  _searchSetStatus('Ricerca…');

  fetch(SEARCH_URL + '?q=' + encodeURIComponent(q), { cache: 'no-store' })
    .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
    .then(function (res) {
      if (res.status === 200) { renderSearch(res.body.reservations || []); _searchSetStatus(''); }
      else _searchSetStatus((res.body && res.body.error) || 'Errore nella ricerca.', true);
    })
    .catch(function () { _searchSetStatus('Errore di connessione.', true); });
}

function clearSearch() {
  document.getElementById('search-wrap').classList.remove('on');
  document.getElementById('search-clear-btn').style.display = 'none';
  document.getElementById('cal-wrap').style.display = '';
  document.querySelector('.toolbar').style.display = '';
  loadMonth();
}

function renderSearch(rows) {
  var list = document.getElementById('search-list');
  document.getElementById('search-sub').textContent = rows.length ? (rows.length + ' prenotazion' + (rows.length === 1 ? 'e' : 'i')) : '';
  if (!rows.length) { list.innerHTML = '<div class="empty-msg">Nessun cliente trovato.</div>'; return; }
  list.innerHTML = '';
  rows.forEach(function (r) {
    var row = document.createElement('div'); row.className = 'res-row';
    row.innerHTML =
      '<div class="res-date">' + fmtItDateShort(r.data) + '<span class="res-time">' + r.orario + '</span></div>' +
      '<div class="res-info">' +
        '<div class="nome">' + escapeHtml(r.nome) + ' · ' + r.persone + 'p</div>' +
        '<div class="meta">' + (r.telefono ? '<a href="tel:' + escapeHtml(r.telefono) + '">' + escapeHtml(r.telefono) + '</a>' : '') +
          (r.email ? ' · ' + escapeHtml(r.email) : '') +
          (r.occasione ? ' · ' + escapeHtml(r.occasione) : '') + '</div>' +
      '</div>' +
      '<div>' + statusBadge(r) + ' ' + confermaBadge(r) + ' ' + garanziaBadge(r) + '</div>';
    var goBtn = document.createElement('button');
    goBtn.className = 'btn'; goBtn.textContent = 'Vai al giorno →'; goBtn.style.marginLeft = '.5rem';
    goBtn.onclick = function () { goToSearchResultDay(r.data); };
    row.appendChild(goBtn);
    row.appendChild(buildArrivoControls(r, function () { doSearch(); }));
    list.appendChild(row);
  });
}

function goToSearchResultDay(dateStr) {
  document.getElementById('search-wrap').classList.remove('on');
  document.getElementById('search-clear-btn').style.display = 'none';
  openDay(dateStr);
}

function _ghToken() {
  var t = localStorage.getItem('gh_token') || '';
  if (!t) {
    t = (window.prompt('Incolla il tuo token GitHub (lo stesso della pubblicazione):') || '').trim();
    if (t) localStorage.setItem('gh_token', t);
  }
  return t;
}

function setArrivoStatus(id, value, onDone) {
  if (value === 'no_show' && !window.confirm('Segnare questa prenotazione come no-show?')) return;
  var token = _ghToken();
  if (!token) { _daySetStatus('Operazione annullata: serve il token GitHub.', true); return; }
  _daySetStatus('Salvataggio…');
  fetch(ACTION_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'set_arrivo_status', id: id, value: value, github_token: token }),
  })
    .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
    .then(function (res) {
      if (res.status === 200 && res.body && res.body.ok) { _daySetStatus('Fatto.'); (onDone || loadDay)(); }
      else if (res.status === 401) _daySetStatus('Token GitHub non valido o senza permessi.', true);
      else _daySetStatus((res.body && res.body.error) || 'Errore.', true);
    })
    .catch(function () { _daySetStatus('Errore di connessione.', true); });
}

function deleteReservation(id, nome, onDone) {
  if (!window.confirm('Eliminare definitivamente la prenotazione di ' + nome + '? L\'operazione non si può annullare. Se è collegata a una garanzia SafeTable, quella resta a parte e va gestita separatamente.')) return;
  var token = _ghToken();
  if (!token) { _daySetStatus('Operazione annullata: serve il token GitHub.', true); return; }
  _daySetStatus('Eliminazione…');
  fetch(ACTION_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'delete_reservation', id: id, github_token: token }),
  })
    .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
    .then(function (res) {
      if (res.status === 200 && res.body && res.body.ok) { _daySetStatus('Prenotazione eliminata.'); (onDone || loadDay)(); }
      else if (res.status === 401) _daySetStatus('Token GitHub non valido o senza permessi.', true);
      else _daySetStatus((res.body && res.body.error) || 'Errore.', true);
    })
    .catch(function () { _daySetStatus('Errore di connessione.', true); });
}

function toggleNewResForm() {
  var wrap = document.getElementById('new-res-wrap');
  var opening = !wrap.classList.contains('on');
  wrap.classList.toggle('on');
  document.getElementById('new-res-status').textContent = '';
  if (opening) {
    ['nr-nome','nr-telefono','nr-email','nr-persone','nr-orario','nr-occasione','nr-intolleranze','nr-note'].forEach(function (id) {
      document.getElementById(id).value = '';
    });
    document.getElementById('nr-data').value = curDate || todayStr();
  }
}

function submitNewRes() {
  var nome = document.getElementById('nr-nome').value.trim();
  var telefono = document.getElementById('nr-telefono').value.trim();
  var email = document.getElementById('nr-email').value.trim();
  var persone = parseInt(document.getElementById('nr-persone').value, 10);
  var data = document.getElementById('nr-data').value;
  var orario = document.getElementById('nr-orario').value.trim();
  var occasione = document.getElementById('nr-occasione').value.trim();
  var intolleranze = document.getElementById('nr-intolleranze').value.trim();
  var note = document.getElementById('nr-note').value.trim();
  var statusEl = document.getElementById('new-res-status');

  if (!nome || !telefono || !data || !orario || !persone) {
    statusEl.className = 'status-line err';
    statusEl.textContent = 'Compila almeno nome, telefono, persone, data e orario.';
    return;
  }

  var token = _ghToken();
  if (!token) { statusEl.className = 'status-line err'; statusEl.textContent = 'Operazione annullata: serve il token GitHub.'; return; }

  statusEl.className = 'status-line'; statusEl.textContent = 'Salvataggio…';
  fetch(ACTION_URL, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'create_reservation', nome: nome, telefono: telefono, email: email,
      persone: persone, data: data, orario: orario, occasione: occasione,
      intolleranze: intolleranze, note: note, github_token: token,
    }),
  })
    .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
    .then(function (res) {
      if (res.status === 200 && res.body && res.body.ok) {
        statusEl.textContent = 'Prenotazione creata.';
        toggleNewResForm();
        if (data === curDate) { loadDay(); }
        else { openDay(data); }
      } else if (res.status === 401) {
        statusEl.className = 'status-line err'; statusEl.textContent = 'Token GitHub non valido o senza permessi.';
      } else {
        statusEl.className = 'status-line err'; statusEl.textContent = (res.body && res.body.error) || 'Errore.';
      }
    })
    .catch(function () { statusEl.className = 'status-line err'; statusEl.textContent = 'Errore di connessione.'; });
}

loadMonth();
</script>
</body>
</html>
