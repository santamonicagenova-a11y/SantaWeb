<!DOCTYPE html>
<!-- v 2026.05.15.01 -->
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lista Vini — Santamonica</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#faf7f2;--ink:#1a1714;--stone:#8c7e6e;--rust:#9e4a2a;--rule:#d4c9b8;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;}
.pg{width:210mm;margin:2rem auto;padding:14mm 22mm 14mm;background:#fff;box-shadow:0 2px 24px rgba(0,0,0,.10);}
.pg-header{text-align:center;margin-bottom:8mm;padding-bottom:5mm;border-bottom:1px solid var(--rule);}
.logo{font-size:3.3rem;font-weight:300;letter-spacing:.22em;text-transform:uppercase;line-height:1;}
.logo em{font-style:italic;color:var(--stone);}
.logo-sub{margin-top:.45rem;font-family:'Jost',sans-serif;font-size:.67rem;letter-spacing:.22em;text-transform:uppercase;color:var(--stone);}
.lista-titolo{font-size:1.5rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;text-align:center;margin:4mm 0 1mm;}
.sommelier{font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--stone);text-align:center;margin-bottom:6mm;}
.sez-titolo{font-size:1.98rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;text-align:center;margin:7mm 0 4mm;padding-bottom:2mm;border-bottom:1px solid var(--rule);}
.sottosez-titolo{font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--stone);margin:5mm 0 3mm;}
.vino{margin-bottom:3.5mm;text-align:justify;font-size:1.0rem;line-height:1.52;}
.version{text-align:center;padding:6px 0;font-family:'Jost',sans-serif;font-size:.55rem;color:#888;letter-spacing:.1em;}
@media print{@page{size:A4 portrait;margin:0;}body{background:white;}.pg{width:210mm;margin:0;box-shadow:none;page-break-after:always;}}
</style>
</head>
<body>
<div class="pg">
<div class="pg-header"><div class="logo">Santa<em>monica</em></div><div class="logo-sub">Lungomare Lombardo 27 — Genova</div></div>
<div class="lista-titolo">Lista Vini &mdash; Wine List</div>
<div class="sommelier">Sommelier Professionista Monica Capurro</div>

</div>
<div class="version">v 2026.05.15.01</div>
</body>
</html>
