<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Menu — Santamonica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #faf7f2;
      --ink:   #1a1714;
      --stone: #8c7e6e;
      --rust:  #9e4a2a;
      --rule:  #d4c9b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
    }

    /* ══════════════════════════════════════
       BARRA CONTROLLI
    ══════════════════════════════════════ */
    .ctrl-bar {
      text-align: center;
      padding: .9rem 1rem;
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--cream);
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: .7rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      padding: .4rem 1.3rem;
      background: transparent;
      border: 1px solid var(--ink);
      font-family: 'Jost', sans-serif;
      font-size: 0.8976rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      transition: background .2s, color .2s;
    }
    .ctrl-btn:hover, .ctrl-btn.active {
      background: var(--ink);
      color: var(--cream);
    }
    .ctrl-sep {
      width: 1px;
      height: 1.4rem;
      background: var(--rule);
    }

    /* ══════════════════════════════════════
       PAGINA  (shared)
    ══════════════════════════════════════ */
    .pg {
      width: 210mm;
      min-height: 297mm;
      margin: 2rem auto;
      padding: 18mm 24mm 16mm;
      background: #fff;
      box-shadow: 0 2px 24px rgba(0,0,0,.10);
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       LAYOUT: MENÙ ALLA CARTA
    ══════════════════════════════════════ */
    #layout-carta { display: block; }
    #layout-orario { display: none; }

    /* ── intestazione ── */
    .pg-header {
      text-align: center;
      margin-bottom: 9mm;
      padding-bottom: 5mm;
      border-bottom: 1px solid var(--rule);
    }
    .logo {
      font-size: 3.3rem;
      font-weight: 300;
      letter-spacing: .22em;
      text-transform: uppercase;
      line-height: 1;
    }
    .logo em { font-style: italic; color: var(--stone); }
    .logo-sub {
      margin-top: .45rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.8844rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--stone);
    }

    /* ── degustazione ── */
    .degu {
      text-align: center;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4mm 0;
    }
    .degu-titolo {
      font-size: 1.848rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 5mm;
    }
    .degu-prezzi {
      font-style: italic;
      font-size: 1.2936rem;
      line-height: 1.4;
      margin-bottom: 2mm;
    }
    .degu-nota {
      font-style: italic;
      font-size: 1.2936rem;
      color: var(--ink);
      margin-bottom: 14mm;
    }
    .degu-nota strong {
      font-style: normal;
      font-weight: 400;
      text-decoration: underline;
      text-underline-offset: 2px;
      color: var(--ink);
    }
    .percorso { margin-bottom: 12mm; }
    .percorso-label {
      font-style: italic;
      font-weight: 700;
      font-size: 1.65rem;
      margin-bottom: 3mm;
    }
    .percorso-piatto { font-size: 1.2672rem; line-height: 1.95; font-style: normal; }
    .percorso-piatto em { font-style: normal; }
    .percorso-libero { font-size: 1.2672rem; line-height: 1.95; font-style: normal; }

    /* ── sezioni carta ── */
    .pg-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .sezione { margin-bottom: 14mm; }
    .sezione-titolo {
      font-family: 'Cormorant Garamond', serif;
      font-style: normal;
      font-size: 1.98rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 5mm;
      padding-bottom: 2mm;
      border-bottom: 1px solid var(--rule);
    }

    /* ── piatti carta ── */
    .piatto {
      text-align: center;
      padding: .5mm 0;
      font-size: 1.2672rem;
      line-height: 1.4;
    }
    .piatto-prezzo {
      font-size: 1.056rem;
      color: var(--stone);
      margin-left: .3rem;
    }
    .piatto-unita {
      font-size: 1.0032rem;
      color: var(--stone);
      margin-left: .1rem;
    }
    .piatto-desc {
      font-style: italic;
      font-size: 1.0824rem;
      color: var(--stone);
      display: block;
    }
    .piatto-staccato { margin-top: 3.5mm; }

    .eco::after {
      content: ' *';
      color: var(--rust);
      font-size: 1.0032em;
    }

    /* ── note ospite carta ── */
    .note-ospite {
      margin-top: auto;
      font-style: italic;
      font-size: 0.9636rem;
      color: var(--stone);
      text-align: center;
      line-height: 1.65;
      padding-top: 5mm;
      border-top: 1px solid var(--rule);
    }
    .note-ospite-titolo {
      text-decoration: underline;
      display: block;
      margin-bottom: 1.2mm;
    }
    .note-ospite u { text-decoration: underline; }

    /* ══════════════════════════════════════
       LAYOUT: FOGLIO ORARIO (1 pagina, 2 col)
    ══════════════════════════════════════ */
    .pg-orario {
      padding: 6mm 8mm 8mm;
    }

    .orario-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.7145rem;
      font-style: italic;
      font-weight: 300;
      letter-spacing: .08em;
      text-align: center;
      margin-bottom: 5mm;
      line-height: 1;
    }

    .orario-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1.5px solid var(--ink);
      flex: 1;
    }

    .orario-col {
      padding: 6mm 8mm;
      display: flex;
      flex-direction: column;
      gap: 6mm;
    }

    .orario-col:first-child {
      border-right: 1.5px solid var(--ink);
    }

    /* separatore tratteggiato interno (dopo ostriche) */
    .orario-sep {
      border: none;
      border-top: 1px dashed var(--stone);
      margin: 1mm 0;
    }

    .orario-sez { text-align: center; }

    .orario-sez-titolo {
      font-size: 1.4662rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 3mm;
    }

    .orario-piatto {
      font-size: 1.173rem;
      line-height: 1.35;
      text-align: center;
      margin-bottom: .55rem;
    }
    .orario-piatto:last-child { margin-bottom: 0; }

    .orario-piatto .eco::after {
      content: ' *';
      color: var(--rust);
      font-size: 1.0032em;
    }

    /* ── sezione orario in basso ── */
    .orario-footer-col {
      display: flex;
      flex-direction: column;
      gap: 4mm;
    }

    .orario-links {
      font-family: 'Cormorant Garamond', serif;
      font-style: normal;
      font-weight: 700;
      font-size: 1.0753rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      line-height: 2.1;
      text-align: center;
    }
    .orario-links u { text-decoration: none; }

    .orario-qr {
      width: 45mm;
      height: 45mm;
      display: block;
      margin: 0 auto;
    }

    .orario-servizio {
      font-style: italic;
      font-size: 0.9775rem;
      line-height: 1.85;
      text-align: center;
    }
    .orario-servizio-titolo {
      text-decoration: underline;
      font-style: italic;
      display: block;
      margin-bottom: 2mm;
    }

    .orario-nota {
      font-size: 0.7038rem;
      color: var(--stone);
      line-height: 1.6;
      text-align: center;
      border-top: 1px solid var(--rule);
      padding-top: 3mm;
      margin-top: auto;
    }

    /* ══════════════════════════════════════
       STAMPA
    ══════════════════════════════════════ */
    @media print {
      @page { size: A4 portrait; margin: 0; }
      body { background: white; }
      .ctrl-bar { display: none; }

      /* carta: 3 pagine */
      #layout-carta .pg {
        width: 210mm;
        height: 297mm;
        min-height: unset;
        margin: 0;
        padding: 15mm 22mm 14mm;
        box-shadow: none;
        page-break-after: always;
      }
      #layout-carta .pg:last-child { page-break-after: avoid; }

      /* orario: 1 pagina */
      #layout-orario .pg {
        width: 210mm;
        height: 297mm;
        min-height: unset;
        margin: 0;
        box-shadow: none;
        page-break-after: avoid;
      }
    }
  </style>
</head>

/* ── helpers condivisi ── */
const NOTE_CARTA = `
  <span class="note-ospite-titolo">Note pour nos hôtes</span>
  Pour maintenir constants le niveau qualitatif et les caractéristiques organoleptiques des matières premières, les produits de la mer achetés frais sont surgelés à basse température. Ces produits sont signalés par le symbole * pour une information claire et transparente à la clientèle.<br>
  La liste des allergènes est consultable à la dernière page de ce menu.
`;

const NOTE_ORARIO = `Pour maintenir constants le niveau qualitatif et les caractéristiques organoleptiques, les produits frais sont surgelés à basse température. Ces produits sont signalés par le symbole : *`;

function getSez(titolo) {
  var found = MENU.sezioni.find(s => s.titolo === titolo);
  if (!found) {
    // Fallback: cerca per titolo_display o per indice
    var idx = ['Crudi','Sfiziosi','Amidi e Carboidrati','Non Solo Mare'].indexOf(titolo);
    if (idx >= 0 && MENU.sezioni[idx]) found = MENU.sezioni[idx];
  }
  return found;
}

function buildPiatto(p) {
  const eco = p.sostenibile ? ' eco' : '';
  const staccato = p.staccato ? ' piatto-staccato' : '';
  const unitaHtml = p.unita ? `<span class="piatto-unita">${p.unita}</span>` : '';
  const prezzoHtml = p.prezzo != null
    ? `<span class="piatto-prezzo">${p.prezzo}${unitaHtml}</span>` : '';
  const descHtml = p.descrizione
    ? `<span class="piatto-desc">${p.descrizione}</span>` : '';
  return `<div class="piatto${staccato}"><span class="piatto-riga${eco}">${p.nome}</span>${prezzoHtml}${descHtml}</div>`;
}

function buildSezione(s) {
  const label = s.titolo_display || s.titolo;
  return `
    <div class="sezione">
      <div class="sezione-titolo">${label}</div>
      ${s.piatti.map(buildPiatto).join('')}
    </div>`;
}

function buildDegu(degu) {
  const optsHtml = degu.opzioni.map(o =>
    `${o.portate} plats &nbsp;€ ${o.prezzo}, accord mets-vins € ${o.vini}`
  ).join('<br>');

  let percorsiHtml = '';
  for (const [n, piatti] of Object.entries(degu.percorsi)) {
    if (typeof piatti === 'string') {
      percorsiHtml += `
        <div class="percorso">
          <div class="percorso-label">&ldquo;${n==="6" && degu.percorso_label_6 ? degu.percorso_label_6 : n==="7" && degu.percorso_label_7 ? degu.percorso_label_7 : n}&rdquo;</div>
          <div class="percorso-piatto percorso-libero">${piatti}</div>
        </div>`;
    } else {
      const righe = piatti.map(p =>
        `<div class="percorso-piatto${p.sostenibile ? ' eco' : ''}">${p.nome}</div>`
      ).join('');
      percorsiHtml += `
        <div class="percorso">
          <div class="percorso-label">&ldquo;${n==="6" && degu.percorso_label_6 ? degu.percorso_label_6 : n==="7" && degu.percorso_label_7 ? degu.percorso_label_7 : n}&rdquo;</div>
          ${righe}
        </div>`;
    }
  }

  return `
    <div class="degu">
      <div class="degu-titolo">Menu Dégustation</div>
      <div class="degu-prezzi">${optsHtml}</div>
      <div class="degu-nota">${degu.nota.replace("l'intero tavolo", "<strong>l\u2019intero tavolo</strong>")}</div>
      ${percorsiHtml}
    </div>`;
}

/* ══════════════════════════════════════
   RENDER: MENÙ ALLA CARTA
══════════════════════════════════════ */
function renderCarta() {
  const root = document.getElementById('layout-carta');
  root.innerHTML = '';

  // Pag 1: intestazione + degustazione
  const pag1 = document.createElement('div');
  pag1.className = 'pg';
  pag1.innerHTML = `
    ${buildDegu(MENU.degustazione)}
    <div class="note-ospite">${NOTE_CARTA}</div>
  `;
  root.appendChild(pag1);

  // Pag 2 e 3: sezioni
  MENU.pagine.forEach(pg => {
    const div = document.createElement('div');
    div.className = 'pg';
    div.innerHTML = `
      <div class="pg-content">
        ${pg.sezioni.map(t => buildSezione(getSez(t))).join('')}
      </div>
      <div class="note-ospite">${NOTE_CARTA}</div>
    `;
    root.appendChild(div);
  });
}

/* ══════════════════════════════════════
   RENDER: FOGLIO ORARIO
══════════════════════════════════════ */
function buildOrarioColonna(titoli, sepDopo) {
  return titoli.map(titolo => {
    const s = getSez(titolo);
    const piatti = s.piatti.map(p => {
      const eco = p.sostenibile ? ' eco' : '';
      const unitaHtml = p.unita ? ` ${p.unita}` : '';
      const prezzoHtml = p.prezzo != null ? ` € ${p.prezzo}${unitaHtml}` : '';
      return `<div class="orario-piatto"><span class="${'piatto-riga' + eco}">${p.nome}${prezzoHtml}</span></div>`;
    }).join('');

    const sep = (titolo === sepDopo) ? '<hr class="orario-sep">' : '';
    // ogni sezione in uno slot flex:1 centrato verticalmente
    return `
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
        <div class="orario-sez">
          <div class="orario-sez-titolo">${s.titolo_display || s.titolo}</div>
          ${piatti}
        </div>
      </div>${sep}`;
  }).join('');
}

function showLayout(which) {
  document.getElementById('layout-carta').style.display  = which === 'carta'  ? 'block' : 'none';
  document.getElementById('layout-orario').style.display = which === 'orario' ? 'block' : 'none';

}
