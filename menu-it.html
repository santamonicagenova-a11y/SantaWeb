<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menù — Santamonica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--cream:#faf7f2;--ink:#1a1714;--stone:#8c7e6e;--rust:#9e4a2a;--rule:#d4c9b8}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--cream);color:var(--ink);font-family:'Cormorant Garamond',Georgia,serif}.pg{width:210mm;min-height:297mm;margin:2rem auto;padding:18mm 24mm 16mm;background:#fff;box-shadow:0 2px 24px rgba(0,0,0,.1);display:flex;flex-direction:column}#layout-carta{display:block}#layout-orario{display:none}.degu{text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center;padding:4mm 0}.degu-titolo{font-size:1.4rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin-bottom:5mm}.degu-prezzi{font-style:italic;font-size:.98rem;line-height:1.4;margin-bottom:2mm}.piatto{text-align:center;padding:.5mm 0;font-size:.96rem;line-height:1.4}.piatto-prezzo{font-size:.8rem;color:var(--stone);margin-left:.3rem}.eco::after{content:' *';color:var(--rust);font-size:.76em}.orario-piatto{font-size:1.2rem;line-height:1.35;text-align:center;margin-bottom:.55rem}@media print{body{background:#fff}#layout-carta .pg,#layout-orario .pg{width:210mm;height:297mm;min-height:unset;margin:0;box-shadow:none;page-break-after:always}}
  </style>
</head>
<body>
<div id="layout-carta"></div>
<div id="layout-orario"></div>
<script>
const MENU={"degustazione":{"opzioni":[{"portate":6,"prezzo":90,"vini":60},{"portate":7,"prezzo":110,"vini":70}],"nota":"Prezzo a persona, menù da considerarsi per l'intero tavolo.","percorsi":{"Sei":[{"nome":"Ali di razza, fave nostrane, mela verde, mandorle","sostenibile":true},{"nome":"Animella di vitello, sedano rapa, nocciole, fondo di pesce","sostenibile":true},{"nome":"Tortelli di cinghiale, dashi di orata, cipollina, shiso"},{"nome":"Tubetti Mancini, baccalà, kosho di agrumi, borlotti","sostenibile":true},{"nome":"Ombrina nostrana pescata ad amo, salicornia, indivia belga","sostenibile":true},{"nome":"Gelato al limone nero, levistico, lime, cracker di latte"}],"Sette":"Menù a mano libera dello Chef"},"percorso_label_6":"Sei","percorso_label_7":"Sette"},"sezioni":[{"titolo":"Crudi","piatti":[{"nome":"Ostriche Fine de Claire","prezzo":4,"unita":"cad."},{"nome":"Ostriche Antilope","prezzo":7,"unita":"cad."},{"nome":"Ostriche Enrico IV","prezzo":8,"unita":"cad."},{"nome":"Scampi nostrani","prezzo":17,"unita":"cad.","sostenibile":true},{"nome":"Gamberi viola nostrani","prezzo":11,"unita":"cad.","sostenibile":true},{"nome":"Selezione solamente di pesci nostrani pescati ad amo","prezzo":37,"sostenibile":true,"staccato":true},{"nome":"Degustazione di mare","prezzo":80,"sostenibile":true,"staccato":true}],"titolo_display":"Crudi"},{"titolo":"Sfiziosi","piatti":[{"nome":"Calamaro nostrano, piselli freschi, bagna cauda, kefir","prezzo":20,"sostenibile":true},{"nome":"Gamberi viola crudi alla puttanesca","prezzo":25,"sostenibile":true},{"nome":"Animella di vitello, sedano rapa, nocciole, riduzione di fondo di pesce","prezzo":22,"sostenibile":true},{"nome":"Ali di razza, fave nostrane, mela verde, mandorle","prezzo":24,"sostenibile":true},{"nome":"Non formaggi","prezzo":22,"descrizione":"(Degustazione di finti formaggi artigianali a base anacardi e latte di mandorla)"}],"titolo_display":"Antipasti"},{"titolo":"Amidi e Carboidrati","piatti":[{"nome":"Spaghettoni quadrati Mancini, anemoni di mare, nduja, maggiorana","prezzo":32,"sostenibile":true},{"nome":"Tortelli di cinghiale, dashi di orata, cipollina, shiso","prezzo":26,"sostenibile":true},{"nome":"Tubetti Mancini, baccalà, il nostro kosho di agrumi fermentato, borlotti","prezzo":24,"sostenibile":true},{"nome":"Riso Riserva San Massimo, ostriche, asparago bianco, vaniglia","prezzo":35,"sostenibile":true}],"titolo_display":"Amidi e Carboidrati"},{"titolo":"Non Solo Mare","piatti":[{"nome":"Ricciola nostrana pescata ad amo, crema di peperonata, purea di melanzane BBQ, tahina","prezzo":34,"sostenibile":true},{"nome":"Zucchina alla scapece, menta, yogurt, pepe Timut","prezzo":18},{"nome":"Ombrina nostrana pescata ad amo, salicornia, indivia belga","prezzo":34,"sostenibile":true},{"nome":"Agnello, piselli freschi, rabarbaro","prezzo":28}],"titolo_display":"Non Solo Mare"}],"pagine":[{"sezioni":["Crudi","Sfiziosi"]},{"sezioni":["Amidi e Carboidrati","Non Solo Mare"]}],"orario":{"colSinistra":["Crudi","Non Solo Mare"],"colDestra":["Amidi e Carboidrati","Sfiziosi"],"separatoreDopo":"Crudi","orarioServizio":[{"giorno":"Martedì","fasce":["19:30 – 22:30"]},{"giorno":"Dal mercoledì al sabato","fasce":["12:30 – 14:30","19:30 – 22:30"]},{"giorno":"Domenica","fasce":["12:30 – 14:30"]}]}};
function getSez(t){let e=MENU.sezioni.find(e=>e.titolo===t);return e||(e=MENU.sezioni[["Crudi","Sfiziosi","Amidi e Carboidrati","Non Solo Mare"].indexOf(t)]),e}
function buildPiatto(t){const e=t.sostenibile?" eco":"",i=t.unita?`<span class="piatto-unita">${t.unita}</span>`:"",o=null!=t.prezzo?`<span class="piatto-prezzo">${t.prezzo}${i}</span>`:"";return`<div class="piatto"><span class="piatto-riga${e}">${t.nome}</span>${o}</div>`}
function buildSezione(t){return`<div class="sezione"><div class="sezione-titolo">${t.titolo_display||t.titolo}</div>${t.piatti.map(buildPiatto).join("")}</div>`}
function buildDegu(t){const e=t.opzioni.map(t=>`${t.portate} portate &nbsp;${t.prezzo}, eventuale abbinamento vini ${t.vini}`).join("<br>");let i="";for(const[o,a]of Object.entries(t.percorsi))"string"==typeof a?i+=`<div class="percorso"><div class="percorso-label">&ldquo;${o}&rdquo;</div><div>${a}</div></div>`:(i+=`<div class="percorso"><div class="percorso-label">&ldquo;${o}&rdquo;</div>${a.map(t=>`<div${t.sostenibile?" class=eco":""} >${t.nome}</div>`).join("")}</div>`);return`<div class="degu"><div class="degu-titolo">Menu Degustazione</div><div class="degu-prezzi">${e}</div>${i}</div>`}
function buildOrarioColonna(t){return t.map(t=>{const e=getSez(t),i=e.piatti.map(t=>{const e=null!=t.prezzo?` ${t.prezzo}${t.unita?" "+t.unita:""}`:"";return`<div class="orario-piatto${t.sostenibile?" eco":""}">${t.nome}${e}</div>`}).join("");return`<div><div>${e.titolo_display||e.titolo}</div>${i}</div>`}).join("")}
function renderCarta(){const t=document.getElementById("layout-carta");t.innerHTML=`<div class="pg">${buildDegu(MENU.degustazione)}</div>`;const e=document.createElement("div");e.className="pg",e.innerHTML=MENU.pagine[0].sezioni.map(t=>buildSezione(getSez(t))).join(""),t.appendChild(e)}
function renderOrario(){const e=document.getElementById("layout-orario"),i=MENU.orario;e.innerHTML=`<div class="pg"><div style="text-align:center">Santamonica</div>${buildOrarioColonna(i.colSinistra)}${buildOrarioColonna(i.colDestra)}</div>`}
renderCarta(),renderOrario();
</script>
</body>
</html>
