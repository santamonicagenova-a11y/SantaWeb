ot Nero 100%", "prezzo_bottiglia": 34, "prezzo_calice": 11, "descrizione": "More, ribes rosso e sottobosco. Poco tannico, fresco e vellutato. Vaniglia e spezie date dall'affinamento in botte."}, {"nome": "\"Trojan Horse\" - Cantina Martinelli", "abv": "12,5%", "extra": "IGT 2022", "uve": "Corvina, Corvinone, Merlot, Cabernet Franc, Garganega", "prezzo_bottiglia": 36, "descrizione": "Fragola e ciliegia, corteccia e terra. Sanguigno, caratteriale ma godibile."}]}]}, {"titolo": "BIRRE", "vini": [{"nome": "Maltus Faber Bianca", "abv": "4,7%", "extra": "33 cl", "prezzo_bottiglia": 10, "descrizione": "Birra di malto pils, frumento ed avena. Colore chiaro con schiuma candida e persistente. Aroma fine ed un po' agrumato. Una birra molto dissetante e piacevole."}, {"nome": "Maltus Faber Blonde", "abv": "5,5%", "extra": "33 cl", "prezzo_bottiglia": 10, "descrizione": "Bianca schiuma persistente. L'aroma è quasi esuberante, erbaceo e fruttato con una sfumatura delicata di pompelmo."}, {"nome": "Maltus Faber Ambrata", "abv": "7%", "extra": "33 cl", "prezzo_bottiglia": 10, "descrizione": "Nell'aroma pulito prevale il caramello. In bocca è morbida, piena, con sentori fruttati gentili e sfuma in un retrogusto più amarognolo e secco."}]}]};

function fmt(v) {
  if (!v) return '';
  var parts = [];
  if (v.abv) parts.push(v.abv);
  if (v.extra) parts.push(v.extra);
  else if (v.annata) parts.push(v.annata);
  if (v.uve) parts.push('Uve: ' + v.uve);
  if (v.regione) parts.push(v.regione);
  return parts.length ? ' - ' + parts.join(' - ') : '';
}

function fmtPrezzo(v) {
  var p = '';
  if (v.prezzo_bottiglia) p += '€ ' + v.prezzo_bottiglia;
  if (v.prezzo_calice) p += ', € ' + v.prezzo_calice;
  if (p) p += '.';
  return p;
}

function renderVino(v) {
  var html = '<div class="vino">';
  html += '<span class="vino-nome">' + v.nome + '</span>';
  var meta = fmt(v);
  if (meta) html += '<span class="vino-meta">' + meta + '</span>';
  // Vino senza annate: prezzo inline
  if (!v.annate && (v.prezzo_bottiglia || v.prezzo_calice)) {
    html += ' <span class="vino-prezzo">' + fmtPrezzo(v) + '</span>';
  }
  if (v.descrizione) html += '<div class="vino-descrizione">' + v.descrizione + '</div>';
  // Annate indentate
  if (v.annate && v.annate.length) {
    html += '<div class="annate-lista">';
    v.annate.forEach(function(a) {
      var ap = a.prezzo_bottiglia ? '€ ' + a.prezzo_bottiglia : '';
      var aAbv = a.abv ? a.abv + ' - ' : '';
      html += '<div class="annata-riga">Annata ' + a.anno + ' ' + aAbv + ap + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderSottosezione(ss) {
  var html = '';
  if (ss.titolo) html += '<div class="sottosezione-titolo">' + ss.titolo + '</div>';
  ss.vini.forEach(function(v) { html += renderVino(v); });
  return html;
}

function renderSezione(sez) {
  var html = '<hr class="sep">';
  html += '<div class="sezione-titolo">' + sez.titolo + '</div>';
  if (sez.nota) html += '<div class="sezione-nota">' + sez.nota + '</div>';
  if (sez.sottosezioni) {
    sez.sottosezioni.forEach(function(ss) { html += renderSottosezione(ss); });
  } else if (sez.vini) {
    sez.vini.forEach(function(v) { html += renderVino(v); });
  }
  return html;
}

function render() {
  var html = '<div class="page">';
  // Cover
  html += '<div class="cover">';
  html += '<div class="cover-title">Lista Vini</div>';
  html += '<hr class="cover-divider">';
  html += '<div class="cover-subtitle">Wine List</div>';
  html += '<div class="cover-sommelier">Sommelier Professionista Monica Capurro</div>';
  html += '</div>';
  // Sezioni
  MENU_VINI.sezioni.forEach(function(sez) {
    html += renderSezione(sez);
  });
  html += '<div class="lingua-links">';
  html += '<a href="menu-vini-en.html"><u>English Wine List</u></a>';
  html += '<a href="menu-vini-fr.html"><u>Carte des Vins</u></a>';
  html += '<a href="menu-vini-de.html"><u>Weinkarte</u></a>';
  html += '<a href="menu-vini-es.html"><u>Lista de Vinos</u></a>';
  html += '</div>';
  html += '<div class="footer-ver">v 2026.04.16.01</div>';
  html += '</div>';
  document.getElementById('root').innerHTML = html;
}

render();
</script>
