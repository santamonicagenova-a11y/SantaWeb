<!DOCTYPE html>
<!-- versione v 2026.04.09.1 -->
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso — Santamonica</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --cream:#faf7f2; --ink:#1a1714; --stone:#8c7e6e; --rust:#9e4a2a; --rule:#d4c9b8; }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--cream); color:var(--ink);
    font-family:'Jost',sans-serif; font-weight:300;
    min-height:100svh; display:flex; align-items:center; justify-content:center;
  }
  .box {
    width:100%; max-width:360px; padding:3rem 2.5rem;
    background:#fff; border:1px solid var(--rule);
    text-align:center;
  }
  .logo {
    font-family:'Cormorant Garamond',serif;
    font-size:1.6rem; font-weight:300; font-style:italic;
    letter-spacing:.08em; color:var(--ink);
    margin-bottom:.4rem;
  }
  .sub {
    font-size:.65rem; letter-spacing:.22em; text-transform:uppercase;
    color:var(--stone); margin-bottom:2.5rem;
  }
  input[type=password] {
    width:100%; padding:.75rem 1rem;
    border:1px solid var(--rule); background:var(--cream);
    font-family:'Jost',sans-serif; font-size:.9rem; color:var(--ink);
    text-align:center; letter-spacing:.2em;
    outline:none; transition:border-color .2s;
    margin-bottom:1.2rem;
  }
  input[type=password]:focus { border-color:var(--stone); }
  button {
    width:100%; padding:.75rem;
    background:var(--ink); color:#fff; border:none;
    font-family:'Jost',sans-serif; font-size:.7rem;
    letter-spacing:.2em; text-transform:uppercase;
    cursor:pointer; transition:background .2s;
  }
  button:hover { background:var(--rust); }
  .err {
    font-size:.75rem; color:var(--rust);
    margin-top:.8rem; min-height:1rem;
  }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Santamonica</div>
  <div class="sub">Area riservata</div>
  <input type="password" id="pwd" placeholder="· · · · · · · ·"
    onkeydown="if(event.key==='Enter') accedi()" autofocus>
  <button onclick="accedi()">Entra</button>
  <div class="err" id="err"></div>
</div>
<script>
function accedi() {
  var pwd = document.getElementById('pwd').value;
  // Cambia 'santamonica2026' con la password che vuoi usare
  if (pwd === 'santamonica2026') {
    window.location.href = 'menu-admin.html';
  } else {
    document.getElementById('err').textContent = 'Password non corretta';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
</script>
<div style="text-align:center;padding-top:1rem;font-size:.55rem;color:rgba(26,23,20,0.25);letter-spacing:.1em;">v 2026.04.09.1</div>
</body>
</html>
